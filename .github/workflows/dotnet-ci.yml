name: .NET CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore TaskManagerApi.slnx

      - name: Build
        run: dotnet build TaskManagerApi.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test TaskManagerApi.slnx --configuration Release --no-build --verbosity normal
