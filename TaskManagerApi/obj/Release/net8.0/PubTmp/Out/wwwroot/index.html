<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 40px 10px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 14px;
            max-width: 800px;
            width: 100%;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            position: relative;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 70%;
            padding: 10px;
        }

        button {
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s ease;
        }

        button:hover {
            transform: scale(1.05);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #ffffff;
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        li:hover {
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .delete-btn {
            background: #ff4d4f;
            color: white;
            border: none;
            padding: 5px 10px;
        }

        .edit-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 5px 10px;
        }

        .save-btn {
            background: #28a745;
            color: white;
        }

        .cancel-btn {
            background: #6c757d;
            color: white;
        }

        .edit-btn,
        .delete-btn {
            flex: 0 0 auto;
        }

        .save-btn,
        .cancel-btn {
            display: none;
        }

        .action-buttons {
            margin-left: auto;
            display: flex;
            gap: 6px;
        }
        .filters {
            display: flex;
            gap: 10px;
            margin: 10px 0 15px 0;
        }

        .filters button {
            background: #eee;
            padding: 6px 12px;
            border-radius: 8px;
        }

        .filters button:hover {
            background: #ddd;
        }

        .filters button.active {
            background: #007bff;
            color: white;
        }

        #logoutBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff4d4f;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
        }

    </style>
</head>

<body>

    <div class="container">

        <div id="loginBox" style="margin-bottom:15px;">
            <input id="email" placeholder="Email" />
            <input id="password" type="password" placeholder="Password" />
            <button onclick="login()">Login</button>
        </div>

        <button id="logoutBtn" onclick="logout()" style="display:none; margin-bottom:10px;">
            Logout
        </button>

        <h1>Task Manager</h1>

        <input type="text" id="taskInput" placeholder="Yeni görev yaz..." />
        <button onclick="addTask()">Ekle</button>

        <input type="text" oninput="onSearchInput(this.value)" id="searchInput" placeholder="Görev ara..." style="width:100%; margin-top:10px;" />
        <div class="filters">
            <button id="filter-all" onclick="setFilter('all')">Tümü</button>
            <button id="filter-active" onclick="setFilter('active')">Aktif</button>
            <button id="filter-completed" onclick="setFilter('completed')">Tamamlanan</button>
        </div>
        <ul id="taskList"></ul>
        <button id="prevBtn" onclick="prevPage()">Önceki</button>
        <button id="nextBtn" onclick="nextPage()">Sonraki</button>
    </div>

    <script>

        let currentPage = 1;
        let pageSize = 5;
        let totalCount = 0;
        let searchText = "";
        let currentFilter = "all";
        let debounceTimer;
        const apiUrl = "https://taskmanagerapi9876-eegsdqejajdxfch3.westeurope-01.azurewebsites.net/api/v1/Task";

        window.onload = function () {
            getTasks();
        };

        function getAuthHeaders() {
            const token = localStorage.getItem("token");

            return {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            };
        }

        // List TASKS
        async function getTasks() {
            const token = localStorage.getItem("token");

            const loginBox = document.getElementById("loginBox");
            const logoutBtn = document.getElementById("logoutBtn");

            // Token yoksa, loginBox'u göster ve logout'u gizle
            if (!token) {
                loginBox.style.display = "block";
                logoutBtn.style.display = "none";
                document.getElementById("taskList").innerHTML = "Please log in to view tasks.";
                return;
            }

            loginBox.style.display = "none";
            logoutBtn.style.display = "block";

            const list = document.getElementById("taskList");
            list.innerHTML = "Loading...";

            try {
                const res = await fetch(`${apiUrl}?page=${currentPage}&pageSize=${pageSize}&filter=${currentFilter}&search=${searchText}`, {
                    headers: getAuthHeaders()
                });

                // 401 hatasında logout yap
                if (res.status === 401) {
                    logout();
                    return;
                }

                if (!res.ok) {
                    throw new Error("API error");
                }

                const result = await res.json();
                const data = result.data;
                totalCount = result.totalCount;

                list.innerHTML = "";
                let filteredTasks = data;

                if (currentFilter === "active") {
                    filteredTasks = filteredTasks.filter(t => !t.isDone);
                } else if (currentFilter === "completed") {
                    filteredTasks = filteredTasks.filter(t => t.isDone);
                }

                if (filteredTasks.length === 0) {
                    list.innerHTML = "Result not found";
                    return;
                }

                filteredTasks.forEach(task => {
                    const li = document.createElement("li");

                    li.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px; width:100%;">
                    <input type="checkbox" ${task.isDone ? "checked" : ""} style="flex:0 0 auto; width:16px; height:16px;" />
                    <span class="task-text" style="${task.isDone ? 'text-decoration: line-through;' : ''} flex: 1 1 auto; min-width: 0; display: block; text-align: left; white-space: normal; overflow-wrap: break-word; word-break: normal;">${task.title}</span>
                    <input class="edit-input" type="text" value="${task.title}" style="display:none; flex:1 1 auto; min-width:0;" />
                    <div class="action-buttons">
                        <button class="edit-btn">✏️</button>
                        <button class="delete-btn">🗑️</button>
                        <button class="save-btn">💾</button>
                        <button class="cancel-btn">❌</button>
                    </div>
                </div>
            `;
                    const textSpan = li.querySelector(".task-text");
                    const editInput = li.querySelector(".edit-input");

                    const editBtn = li.querySelector(".edit-btn");
                    const saveBtn = li.querySelector(".save-btn");
                    const cancelBtn = li.querySelector(".cancel-btn");

                    editBtn.addEventListener("click", () => {
                        textSpan.style.display = "none";
                        editInput.style.display = "block";
                        editBtn.style.display = "none";
                        saveBtn.style.display = "inline-block";
                        cancelBtn.style.display = "inline-block";
                        editInput.focus();
                    });

                    saveBtn.addEventListener("click", async () => {
                        const newTitle = editInput.value.trim();

                        if (!newTitle) return;

                        await fetch(`${apiUrl}/${task.id}`, {
                            method: "PUT",
                            headers: getAuthHeaders(),
                            body: JSON.stringify({
                                id: task.id,
                                title: newTitle,
                                isDone: task.isDone
                            })
                        });

                        getTasks();
                    });

                    cancelBtn.addEventListener("click", () => {
                        editInput.value = task.title;
                        textSpan.style.display = "block";
                        editInput.style.display = "none";
                        editBtn.style.display = "inline-block";
                        saveBtn.style.display = "none";
                        cancelBtn.style.display = "none";
                    });

                    const checkbox = li.querySelector("input");
                    checkbox.addEventListener("change", () => {
                        toggleTask(task);
                    });

                    const deleteBtn = li.querySelector(".delete-btn");
                    deleteBtn.addEventListener("click", () => {
                        deleteTask(task.id);
                    });

                    list.appendChild(li);
                });

                const totalPages = Math.ceil(totalCount / pageSize);

                document.getElementById("prevBtn").disabled = currentPage === 1;
                document.getElementById("nextBtn").disabled = currentPage === totalPages;

            } catch (err) {
                console.error(err);
                list.innerHTML = "Error occurred";
            }
        }

        // ADD TASK
        async function addTask() {
            const input = document.getElementById("taskInput");

            const task = {
                title: input.value,
                isDone: false
            };

            await fetch(apiUrl, {
                method: "POST",
                headers: getAuthHeaders(),
                body: JSON.stringify(task)
            });

            input.value = "";
            getTasks();
        }

        // DELETE TASK
        async function deleteTask(id) {
            await fetch(`${apiUrl}/${id}`, {
                method: "DELETE",
                headers: getAuthHeaders()
            });

            getTasks();
        }

        async function toggleTask(task) {

            await fetch(`${apiUrl}/${task.id}`, {
                method: "PUT",
                headers: getAuthHeaders(),
                body: JSON.stringify({
                    id: task.id,
                    title: task.title,
                    isDone: !task.isDone
                })
            });

            getTasks();
        }
        function nextPage() {
            const totalPages = Math.ceil(totalCount / pageSize);

            if (currentPage < totalPages) {
                currentPage++;
                getTasks();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                getTasks();
            }
        }

        //Filter Tasks
        function setFilter(filter) {
            currentFilter = filter;

            document.querySelectorAll(".filters button")
                .forEach(btn => btn.classList.remove("active"));

            document.getElementById("filter-" + filter)
                .classList.add("active");

            getTasks();
        }

        document.getElementById("searchInput").addEventListener("input", (e) => {
            searchText = e.target.value.toLowerCase();
            getTasks();
        });

        //Debounce Search
        function onSearchInput(value) {
            if (value.length < 2) return;

            clearTimeout(debounceTimer);

            debounceTimer = setTimeout(() => {
                searchText = value;
                currentPage = 1;
                getTasks();
            }, 200);
        }

        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const res = await fetch("https://taskmanagerapi9876-eegsdqejajdxfch3.westeurope-01.azurewebsites.net/api/v1/Auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            localStorage.setItem("token", data.token);

            document.getElementById("loginBox").style.display = "none";

            getTasks();
        }

        function logout() {
            localStorage.removeItem("token");
            location.reload();
        }

        document.addEventListener("DOMContentLoaded", function () {
            const token = localStorage.getItem("token");

            if (token) {
                document.getElementById("loginBox").style.display = "none";
                getTasks();
            }
        });

        /* setFilter("all");*/
        document.getElementById("filter-all").classList.add("active");

    </script>

</body>
</html>
