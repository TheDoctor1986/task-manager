<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 800px;
            width: 100%;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        input {
            width: 70%;
            padding: 10px;
        }

        button {
            padding: 10px;
            margin-left: 5px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #eee;
            margin-top: 10px;
            padding: 10px;
            /*display: flex;
            justify-content: space-between;*/
            border-radius: 5px;
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
        }

        .edit-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 5px 10px;
        }

        .edit-btn,
        .delete-btn {
            flex: 0 0 auto;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Task Manager</h1>

        <input type="text" id="taskInput" placeholder="Yeni görev yaz..." />
        <button onclick="addTask()">Ekle</button>

        <input type="text" id="searchInput" placeholder="Görev ara..." style="width:100%; margin-top:10px;" />

        <ul id="taskList"></ul>
        <button id="prevBtn" onclick="prevPage()">Önceki</button>
        <button id="nextBtn" onclick="nextPage()">Sonraki</button>
    </div>

    <script>

        let currentPage = 1;
        let pageSize = 5;
        let totalCount = 0;
        let searchText = "";
        const apiUrl = "https://taskmanagerapi9876-eegsdqejajdxfch3.westeurope-01.azurewebsites.net/api/v1/Task";

        // SAYFA YÜKLENİNCE
        window.onload = function () {
            getTasks();
        };

        // TASK LİSTELE
        async function getTasks() {
            const list = document.getElementById("taskList");
            list.innerHTML = "Yükleniyor...";

            try {
                const res = await fetch(`${apiUrl}?page=${currentPage}&pageSize=${pageSize}`);

                if (!res.ok) {
                    throw new Error("API hata verdi"); // 👈 KRİTİK
                }

                const result = await res.json();
                const data = result.data;
                totalCount = result.totalCount;

                list.innerHTML = ""; // 👈 önce temizle

                const filtered = data.filter(task =>
                    task.title.toLowerCase().includes(searchText)
                );

                // 👇 BURAYA EKLİYORSUN
                if (filtered.length === 0) {
                    list.innerHTML = "Sonuç bulunamadı";
                    return;
                }
                filtered.forEach(task => {
                    const li = document.createElement("li");

                    li.innerHTML = `
                        <div style="display:flex; align-items:flex-start; gap:10px; width:100%;">

                          <input type="checkbox" ${task.isDone ? "checked" : ""} 
                                 style="width:16px; height:16px; flex:0 0 auto; margin-top:4px;" />

                            <span class="task-text" style="
                                ${task.isDone ? 'text-decoration: line-through;' : ''}
                                flex: 1 1 auto;
                                min-width: 0;
                                display: block;
                                white-space: normal;
                                overflow-wrap: break-word;
                                word-break: normal;
                            ">
                                ${task.title}
                            </span>

                            <input class="edit-input" type="text" value="${task.title}" 
                                   style="
                                       display:none;
                                       flex:1 1 auto;
                                       min-width:0;
                                   " />

                            <button class="edit-btn">Düzenle</button>
                            <button class="delete-btn">Sil</button>

                            <button class="save-btn" style="display:none;">Kaydet</button>
                            <button class="cancel-btn" style="display:none;">İptal</button>

                        </div>
                        `;
                    const textSpan = li.querySelector(".task-text");
                    const editInput = li.querySelector(".edit-input");

                    const editBtn = li.querySelector(".edit-btn");
                    const saveBtn = li.querySelector(".save-btn");
                    const cancelBtn = li.querySelector(".cancel-btn");

                    editBtn.addEventListener("click", () => {
                        textSpan.style.display = "none";
                        editInput.style.display = "block";

                        editBtn.style.display = "none";
                        saveBtn.style.display = "inline-block";
                        cancelBtn.style.display = "inline-block";

                        editInput.focus();
                    });

                    saveBtn.addEventListener("click", async () => {
                        const newTitle = editInput.value.trim();

                        if (!newTitle) return;

                        await fetch(`${apiUrl}/${task.id}`, {
                            method: "PUT",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                id: task.id,
                                title: newTitle,
                                isDone: task.isDone
                            })
                        });

                        getTasks(); // 👈 EN KRİTİK
                    });

                    cancelBtn.addEventListener("click", () => {
                        // input'u eski haline getir
                        editInput.value = task.title;

                        // görünümü geri al
                        textSpan.style.display = "block";
                        editInput.style.display = "none";

                        editBtn.style.display = "inline-block";
                        saveBtn.style.display = "none";
                        cancelBtn.style.display = "none";
                    });

                    const checkbox = li.querySelector("input");
                    checkbox.addEventListener("change", () => {
                        toggleTask(task);
                    });

                    const deleteBtn = li.querySelector(".delete-btn");
                    deleteBtn.addEventListener("click", () => {
                        deleteTask(task.id);
                    });

                    list.appendChild(li);
                });

                const totalPages = Math.ceil(totalCount / pageSize);

                document.getElementById("prevBtn").disabled = currentPage === 1;
                document.getElementById("nextBtn").disabled = currentPage === totalPages;

            } catch (err) {
                console.error(err);
                list.innerHTML = "Hata oluştu"; // 👈 UI fix
            }
        }

        // TASK EKLE
        async function addTask() {
            const input = document.getElementById("taskInput");

            const task = {
                title: input.value,
                isDone: false
            };

            await fetch(apiUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(task)
            });

            input.value = "";
            getTasks();
        }

        // TASK SİL
        async function deleteTask(id) {
            await fetch(`${apiUrl}/${id}`, {
                method: "DELETE"
            });

            getTasks();
        }

        async function toggleTask(task) {

            await fetch(`${apiUrl}/${task.id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    id: task.id,
                    title: task.title,
                    isDone: !task.isDone
                })
            });

            getTasks();
        }
        function nextPage() {
            const totalPages = Math.ceil(totalCount / pageSize);

            if (currentPage < totalPages) {
                currentPage++;
                getTasks();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                getTasks();
            }
        }

        document.addEventListener("DOMContentLoaded", getTasks);
        document.getElementById("searchInput").addEventListener("input", (e) => {
            searchText = e.target.value.toLowerCase();
            getTasks();
        });

    </script>

</body>
</html>
